name: 🏃 Mise à jour des minima FFA

# ─────────────────────────────────────────────────────────────────────────────
# Déclenchement UNIQUEMENT manuel :
#   • Via le bouton "Recherche minima" de la page web  (appel API)
#   • Via l'onglet Actions de GitHub  (bouton "Run workflow")
# ─────────────────────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
  schedule:
    - cron: '23 5 * * *'

permissions:
  contents: write   # nécessaire pour git push

jobs:
  update-minima:
    runs-on: ubuntu-latest
    env:
      TZ: "Europe/Paris"
    timeout-minutes: 15   # sécurité anti-boucle infinie

    steps:

      - name: 📥 Checkout repository
        uses: actions/checkout@v4

      - name: 🐍 Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4 openpyxl

      - name: 🚀 Run scraping (mode headless)
        run: python run_headless.py

      # Commit uniquement si achievements.js ou last_update.js ont changé
      - name: 💾 Commit & push les fichiers générés
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add achievements.js last_update.js
          git diff --staged --quiet \
            || git commit -m "🏃 Minima mis à jour – $(date +'%d/%m/%Y %H:%M')"
          git push
